name: Terraform Prod

on:
  pull_request:
    paths:
      - ".github/workflows/terraform-prod.yml"
      - "environments/prod/**"
      - "modules/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/terraform-prod.yml"
      - "environments/prod/**"
      - "modules/**"
  workflow_dispatch:
    inputs:
      run_apply:
        description: "Run terraform apply after plan approval"
        required: true
        default: false
        type: boolean
      approve_production_apply:
        description: "Type APPROVE-PROD-APPLY to confirm production apply"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: terraform-prod-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_ENV: prod
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_tenant_id: ${{ vars.AZURE_TENANT_ID }}
  TF_VAR_project_name: ${{ vars.TF_PROJECT_NAME }}
  TF_VAR_environment: prod
  TF_VAR_location: ${{ vars.TF_LOCATION }}
  TF_VAR_vnet_cidr: ${{ vars.TF_VNET_CIDR_JSON }}
  TF_VAR_subnet_cidrs: ${{ vars.TF_SUBNET_CIDRS_JSON }}
  TF_VAR_admin_source_cidrs: ${{ vars.TF_ADMIN_SOURCE_CIDRS_JSON }}
  TF_VAR_enable_app_vm_public_ip: ${{ vars.TF_ENABLE_APP_VM_PUBLIC_IP || 'false' }}
  TF_VAR_vm_size: ${{ vars.TF_LINUX_VM_SIZE }}
  TF_VAR_admin_username: ${{ vars.TF_LINUX_ADMIN_USERNAME }}
  TF_VAR_admin_ssh_public_key: ${{ secrets.TF_ADMIN_SSH_PUBLIC_KEY }}
  TF_VAR_windows_vm_size: ${{ vars.TF_WINDOWS_VM_SIZE }}
  TF_VAR_enable_management_vm_public_ip: ${{ vars.TF_ENABLE_MANAGEMENT_VM_PUBLIC_IP || 'false' }}
  TF_VAR_windows_admin_username: ${{ vars.TF_WINDOWS_ADMIN_USERNAME }}
  TF_VAR_windows_admin_password: ${{ secrets.TF_WINDOWS_ADMIN_PASSWORD }}
  TF_VAR_log_retention_in_days: ${{ vars.TF_LOG_RETENTION_IN_DAYS }}
  TF_VAR_cpu_alert_threshold_percent: ${{ vars.TF_CPU_ALERT_THRESHOLD_PERCENT }}
  TF_VAR_monitor_action_group_email_receivers: ${{ vars.TF_ACTION_GROUP_EMAIL_RECEIVERS_JSON }}
  TF_VAR_enable_synthetic_availability: ${{ vars.TF_ENABLE_SYNTHETIC_AVAILABILITY == 'true' && vars.TF_SYNTHETIC_CHECK_URL != '' && 'true' || 'false' }}
  TF_VAR_synthetic_check_url: ${{ vars.TF_SYNTHETIC_CHECK_URL || '' }}
  TF_VAR_synthetic_frequency_seconds: ${{ vars.TF_SYNTHETIC_FREQUENCY_SECONDS || '300' }}
  TF_VAR_synthetic_timeout_seconds: ${{ vars.TF_SYNTHETIC_TIMEOUT_SECONDS || '30' }}
  TF_VAR_synthetic_failed_location_count: ${{ vars.TF_SYNTHETIC_FAILED_LOCATION_COUNT || '2' }}
  TF_VAR_synthetic_latency_threshold_ms: ${{ vars.TF_SYNTHETIC_LATENCY_THRESHOLD_MS || '2000' }}
  TF_VAR_synthetic_alert_severity_availability: ${{ vars.TF_SYNTHETIC_ALERT_SEVERITY_AVAILABILITY || '1' }}
  TF_VAR_synthetic_alert_severity_latency: ${{ vars.TF_SYNTHETIC_ALERT_SEVERITY_LATENCY || '2' }}
  TF_VAR_enable_container_workload: ${{ vars.TF_ENABLE_CONTAINER_WORKLOAD || 'false' }}
  TF_VAR_container_subnet_cidr: ${{ vars.TF_CONTAINER_SUBNET_CIDR || '' }}
  TF_VAR_container_image: ${{ vars.TF_CONTAINER_IMAGE || 'nginx:stable-alpine' }}
  TF_VAR_container_cpu: ${{ vars.TF_CONTAINER_CPU || '0.5' }}
  TF_VAR_container_memory_gb: ${{ vars.TF_CONTAINER_MEMORY_GB || '1' }}
  TF_VAR_backup_time_utc: ${{ vars.TF_BACKUP_TIME_UTC }}
  TF_VAR_backup_daily_retention_count: ${{ vars.TF_BACKUP_DAILY_RETENTION_COUNT }}
  TF_VAR_owner: ${{ vars.TF_OWNER }}
  TF_VAR_cost_center: ${{ vars.TF_COST_CENTER }}
  TF_VAR_business_unit: ${{ vars.TF_BUSINESS_UNIT }}
  TF_VAR_extra_tags: ${{ vars.TF_EXTRA_TAGS_JSON }}

jobs:
  terraform-check:
    name: Terraform Fmt Validate And Security Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (No Backend)
        working-directory: environments/prod
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: environments/prod
        run: terraform validate

      - name: TFLint
        working-directory: environments/prod
        run: |
          tflint --init
          tflint --recursive

      - name: Tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: environments/prod

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: environments/prod
          framework: terraform

  terraform-plan:
    name: Terraform Plan (Prod)
    runs-on: ubuntu-latest
    needs: terraform-check
    defaults:
      run:
        shell: bash
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init (Remote Backend)
        working-directory: environments/prod
        run: >
          terraform init
          -backend-config="use_azuread_auth=true"
          -backend-config="use_oidc=true"
          -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}"
          -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}"
          -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}"
          -backend-config="key=prod.terraform.tfstate"

      - name: Terraform Plan
        working-directory: environments/prod
        run: terraform plan -no-color -input=false -lock-timeout=5m -out=tfplan

      - name: Generate Plan Checksum
        working-directory: environments/prod
        run: sha256sum tfplan > tfplan.sha256

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-prod
          path: |
            environments/prod/tfplan
            environments/prod/tfplan.sha256
          retention-days: 14

  plan-approval:
    name: Plan Approval Gate (Prod)
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch' && inputs.run_apply == true
    environment: prod-plan-approval
    steps:
      - name: Approval Checkpoint
        run: echo "Plan approved for prod apply."

  terraform-apply:
    name: Terraform Apply (Prod Manual Only)
    runs-on: ubuntu-latest
    needs: plan-approval
    if: github.event_name == 'workflow_dispatch' && inputs.run_apply == true && inputs.approve_production_apply == 'APPROVE-PROD-APPLY' && github.ref == 'refs/heads/main'
    environment: prod
    concurrency:
      group: terraform-prod-apply
      cancel-in-progress: false
    defaults:
      run:
        shell: bash
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init (Remote Backend)
        working-directory: environments/prod
        run: >
          terraform init
          -backend-config="use_azuread_auth=true"
          -backend-config="use_oidc=true"
          -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}"
          -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}"
          -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}"
          -backend-config="key=prod.terraform.tfstate"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-prod
          path: environments/prod

      - name: Verify Plan Integrity
        working-directory: environments/prod
        run: sha256sum -c tfplan.sha256

      - name: Terraform Apply (Approved Plan)
        working-directory: environments/prod
        run: terraform apply -no-color -input=false -lock-timeout=5m -auto-approve tfplan
